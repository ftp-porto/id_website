<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0B0D10" />
<title>Appstudio - Bespoke Applications Built Around Your Business</title>
<meta
  name="description"
  content="Explore Appstudio, FTP's custom software service for internal tools, dashboards, automations, portals, mobile apps and ERP-connected workflows."
/>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

<link rel="icon" type="image/png" href="assets/ftp-logo.png" />
<link rel="stylesheet" href="styles.css" />
</head>
<body class="service-body">

<a class="brand" href="index.html#top" aria-label="FTP - Home" title="FTP">
  <img class="brand__logo" src="assets/ftp-logo.png" alt="FTP" width="56" height="22" />
  <span class="brand__phrase">Lab</span>
</a>

<button class="theme-toggle" data-theme-toggle type="button" aria-label="Toggle light / dark mode" title="Toggle light / dark mode">
  <svg class="theme-toggle__icon theme-toggle__icon--sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">
    <circle cx="12" cy="12" r="4"/>
    <path d="M12 2v2 M12 20v2 M2 12h2 M20 12h2 M5 5l1.4 1.4 M17.6 17.6L19 19 M5 19l1.4-1.4 M17.6 6.4L19 5"/>
  </svg>
  <svg class="theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
  </svg>
</button>

<div class="language-switcher" data-language-switcher role="group" aria-label="Select language">
  <span class="language-switcher__icon" aria-hidden="true">🌐</span>
  <button type="button" class="language-switcher__btn" id="language-select" data-language-select aria-haspopup="listbox" aria-expanded="false" aria-label="Select language">
    <span class="language-switcher__current" data-language-current></span>
    <span class="language-switcher__chevron" aria-hidden="true">▾</span>
  </button>
  <ul class="language-switcher__menu" role="listbox" data-language-menu hidden></ul>
</div>

<main class="service-page" data-appstudio-page></main>

<script src="translations/en.js" defer></script>
<script src="translations/pt.js" defer></script>
<script src="translations/es.js" defer></script>
<script src="translations/fr.js" defer></script>
<script src="appstudio.js" defer></script>
</body>
</html>
